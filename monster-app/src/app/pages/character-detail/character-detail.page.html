<!-- src/app/pages/character-detail/character-detail.page.html -->
<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">‹</ion-button>
    </ion-buttons>
    <ion-title>{{ character?.name | uppercase }}</ion-title>
    <ion-buttons slot="end">
      <div class="logo-home-btn" (click)="goHome()">
        <img src="assets/images/monster-logo.png" alt="Monster" />
      </div>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="detail-content" *ngIf="character">

  <!-- FOTO HERO -->
  <div class="detail-hero">
    <img [src]="character.image" [alt]="character.name" class="detail-hero-img" />
    <div class="detail-hero-overlay"></div>
    <div class="detail-hero-info">
      <div class="detail-role">{{ character.role }}</div>
      <h1 class="detail-name">{{ character.name }}</h1>
    </div>
  </div>

  <!-- STATS -->
  <div class="detail-stats">
    <div class="stat-item">
      <span class="stat-label">EDAD</span>
      <span class="stat-value">{{ character.age }}</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">ORIGEN</span>
      <span class="stat-value">{{ character.nationality }}</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-item">
      <span class="stat-label">ROL</span>
      <span class="stat-value">{{ character.role }}</span>
    </div>
  </div>

  <!-- QUOTE -->
  <div class="detail-quote">
    <div class="quote-mark">"</div>
    <p class="quote-text">{{ character.quote.replace('"','').replace('"','') }}</p>
  </div>

  <div class="divider-blood"></div>

  <!-- DESCRIPCIÓN -->
  <div class="detail-body">
    <h2 class="section-title">HISTORIA</h2>
    <p class="detail-description" *ngFor="let paragraph of getDescParagraphs()">
      {{ paragraph }}
    </p>
  </div>

  <!-- TAGS -->
  <div class="detail-tags">
    <span class="char-tag" *ngFor="let tag of character.tags">{{ tag }}</span>
  </div>

  <div style="height: 40px;"></div>

</ion-content>
